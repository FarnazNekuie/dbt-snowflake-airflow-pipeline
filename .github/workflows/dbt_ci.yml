name: dbt CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dbt-build:
    name: Validate dbt project
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: .github/profiles

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core>=1.11,<2.0" "dbt-snowflake>=1.11,<2.0"

      - name: Verify dbt installation
        run: dbt --version

      - name: Install dbt packages
        run: dbt deps

      - name: Parse dbt project
        run: dbt parse

      - name: List resources
        run: dbt list --resource-type model --resource-type snapshot --resource-type test --resource-type source
