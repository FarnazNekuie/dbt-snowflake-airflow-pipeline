version: 2

models:
  - name: fct_orders
    columns:
      - name: order_key
        tests:
          - not_null
          - unique

      - name: status_code
        tests:
          - accepted_values:
              arguments:
                values: ['O', 'F', 'P']

      - name: item_discount_amount
        tests:
          - not_null

  - name: dim_customers
    columns:
      - name: customer_key
        tests:
          - not_null
          - unique

  - name: dim_order_status
    columns:
      - name: status_code
        tests:
          - not_null
          - unique

  - name: dim_order_dates
    columns:
      - name: order_date
        tests:
          - not_null
          - unique

  - name: fct_github_workflow_runs
    columns:
      - name: workflow_run_id
        tests:
          - not_null
          - unique

      - name: repository_id
        tests:
          - not_null

      - name: workflow_duration_seconds
        tests:
          - not_null